# cargo-deny configuration — run with: cargo deny check
# See https://embarkstudios.github.io/cargo-deny/

[advisories]
# Deny crates with known security vulnerabilities.
version = 2
ignore = []

[licenses]
# Every dependency must use one of these licenses.
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "Unicode-3.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "Zlib",
    "OpenSSL",
]
# Confidence threshold for license detection (0.0–1.0).
confidence-threshold = 0.8

[bans]
# Warn when the same crate appears at two different versions.
multiple-versions = "warn"
# Disallow wildcard version requirements (e.g. "*").
wildcards = "deny"
deny = []

[sources]
# Only allow crates from crates.io. Deny unknown registries and raw git deps.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
