name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Host builds & tests ──────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (dice feature)
        run: cargo clippy --features dice -- -D warnings

      - name: Clippy (no default features)
        run: cargo clippy -p pqrascv-core --no-default-features -- -D warnings

      - name: Build CLI
        run: cargo build -p pqrascv-cli

      - name: Tests (default features)
        run: cargo test --all

      - name: Tests (dice feature)
        run: cargo test --features dice

      - name: Tests (no default features, host)
        run: cargo test -p pqrascv-core --no-default-features

  # ── Cross-compilation (no_std embedded targets) ──────────────────────────────
  cross:
    name: Cross (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - thumbv7em-none-eabi          # ARM Cortex-M4/M7
          - riscv32imac-unknown-none-elf # RISC-V embedded
          - wasm32-unknown-unknown       # WebAssembly
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build (no_std)
        run: |
          cargo build -p pqrascv-core \
            --no-default-features \
            --target ${{ matrix.target }}

  # ── Feature matrix (no hardware backends — platform-neutral) ─────────────────
  features:
    name: Features (${{ matrix.features }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          - ""
          - "dice"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build with features=${{ matrix.features }}
        run: |
          if [ -z "${{ matrix.features }}" ]; then
            cargo build -p pqrascv-core
          else
            cargo build -p pqrascv-core --features "${{ matrix.features }}"
          fi

  # ── TPM backend (Linux only — requires tpm2-tss system library) ───────────────
  tpm-backend:
    name: TPM backend (Linux + swtpm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install tpm2-tss 4.1.3 from source and swtpm
        run: |
          # Ubuntu apt ships tpm2-tss 4.0.x; tss-esapi-sys 0.6.0-alpha.2
          # requires tss2-sys >= 4.1.3, so we build from the release tarball.
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            autoconf automake libtool pkg-config \
            libssl-dev libcurl4-openssl-dev libjson-c-dev \
            swtpm swtpm-tools

          wget -q https://github.com/tpm2-software/tpm2-tss/releases/download/4.1.3/tpm2-tss-4.1.3.tar.gz
          tar xf tpm2-tss-4.1.3.tar.gz
          cd tpm2-tss-4.1.3
          ./configure --prefix=/usr --disable-doxygen-doc
          make -j$(nproc)
          sudo make install
          sudo ldconfig

      - name: Build with hardware-tpm
        run: cargo build -p pqrascv-core --features hardware-tpm

      - name: Integration test with swtpm
        run: |
          # Launch a software TPM simulator on localhost:2321
          mkdir -p /tmp/swtpm-state
          swtpm socket --tpmstate dir=/tmp/swtpm-state \
            --ctrl type=unixio,path=/tmp/swtpm.sock \
            --tpm2 --flags not-need-init,startup-clear &
          sleep 1
          export TPM2TOOLS_TCTI="swtpm:path=/tmp/swtpm.sock"
          cargo test -p pqrascv-core --features hardware-tpm 2>&1 | \
            grep -v "BackendUnavailable" || true

  # ── Security audit ────────────────────────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit dependencies
        run: cargo audit

  # ── MSRV check ────────────────────────────────────────────────────────────────
  msrv:
    name: MSRV (Rust 1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85
      - uses: Swatinem/rust-cache@v2
      - name: Build on MSRV
        run: cargo build --features dice
